# cp config.example.yml config.yml — и заполнить.
# Секреты (токен бота и т.п.) — в .env, здесь только структура магазина.

# показывается в боте и на странице подписки
shop_name: "Neon VPN"

# поддержка — личка или чат в Telegram
support_url: "https://t.me/your_support"

# новостной канал; пустая строка = кнопка не показывается
channel_url: ""

# пробный период, выдаётся один раз на пользователя
trial:
  enabled: true
  days: 3
  traffic_gb: 20      # ГБ, 0 = безлимит
  devices: 1          # 0 = без ограничений

# процент с каждого платежа приглашённого — на баланс пригласившего
referral_percent: 20

# быстрые суммы пополнения, руб
topup_amounts: [100, 200, 500, 1000]

# Серверы (локации). Два варианта:
#   1) один мастер-сервер с федерацией — подписка уже содержит все локации,
#      хватит одной записи (name: "🌍 Все локации");
#   2) несколько независимых серверов — пользователь выбирает локацию при покупке,
#      по записи на каждую.
servers:
  - key: "main"                          # стабильный id, только [a-z0-9_]
    name: "🌍 Все локации"               # видит пользователь
    api_url: "https://1.2.3.4:56789"     # API сервера, префикс /api добавится сам
    api_token: "TOKEN"                   # из установки VLESS-сервера
    sub_url: "https://1.2.3.4:56790"     # публичный sub-порт (проксируем подписки через него)
    verify_ssl: false                    # false для самоподписанного сертификата

# Тарифы: срок + лимиты + цена.
#   traffic_gb: 0 - безлимит
#   devices: 0 - без ограничения устройств
#   price_stars: 0 - посчитается сам: ceil(price_rub * stars_per_rub)
plans:
  - id: "m1"          # стабильный id тарифа
    title: "1 месяц"  # видит пользователь
    days: 30
    traffic_gb: 0
    devices: 3
    price_rub: 150
    price_stars: 100
  - id: "m3"
    title: "3 месяца"
    days: 90
    traffic_gb: 0
    devices: 3
    price_rub: 400
    price_stars: 0
  - id: "m6"
    title: "6 месяцев"
    days: 180
    traffic_gb: 0
    devices: 5
    price_rub: 700
    price_stars: 0

# курс рубль-Stars для тарифов с price_stars: 0
stars_per_rub: 0.7
